<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Crie sua conta no portal VG 24H — Prefeitura de Várzea Grande." />
    <title>Criar Conta — VG 24H</title>
    <link rel="stylesheet" href="https://cdngovbr-ds.estaleiro.serpro.gov.br/design-system/fonts/rawline/css/rawline.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway:300,400,500,600,700,800,900&display=swap" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@govbr-ds/core@3.7.0/dist/core.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.min.css" />
    <link rel="stylesheet" href="css/vg24h.css" />
  </head>
  <body>
    <div class="template-base auth-page">

      <!-- ====== HEADER (compact) ====== -->
      <header class="br-header" id="header">
        <div class="container-lg">
          <div class="header-top">
            <div class="header-logo">
              <a href="index.html">
                <img
                  src="https://cdngovbr-ds.estaleiro.serpro.gov.br/design-system/images/logo-positive.png"
                  alt="logo gov.br"
                />
              </a>
              <span class="br-divider vertical"></span>
              <div class="header-sign">Prefeitura de Várzea Grande — VG 24H</div>
            </div>
          </div>
        </div>
      </header>

      <!-- ====== CADASTRO FORM ====== -->
      <main class="auth-main" id="main-content">
        <div class="auth-card auth-card-wide">
          <div class="auth-logo">
            <img
              src="https://cdngovbr-ds.estaleiro.serpro.gov.br/design-system/images/logo-positive.png"
              alt="logo gov.br"
            />
            <span>VG 24H</span>
          </div>

          <h1 class="auth-title">Criar sua conta</h1>
          <p class="auth-subtitle">Preencha os dados abaixo para se cadastrar como cidadão.</p>

          <!-- Step Indicator -->
          <div class="br-step" data-type="simple">
            <div class="step-progress">
              <div class="step-progress-btn" step-num="1" active title="Dados Pessoais">
                <span class="step-info">Dados Pessoais</span>
              </div>
              <div class="step-progress-btn" step-num="2" title="Endereço">
                <span class="step-info">Endereço</span>
              </div>
              <div class="step-progress-btn" step-num="3" title="Segurança">
                <span class="step-info">Segurança</span>
              </div>
            </div>
          </div>

          <form id="cadastro-form" action="#" method="post">
            <div class="wizard-container">

              <!-- STEP 1 — Dados Pessoais -->
              <div class="wizard-step active" id="step-dados">
                <div class="form-group">
                  <div class="br-input">
                    <label for="cad-nome">Nome completo *</label>
                    <input id="cad-nome" type="text" placeholder="Seu nome completo" required />
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <div class="br-input">
                      <label for="cad-cpf">CPF *</label>
                      <input id="cad-cpf" type="text" placeholder="000.000.000-00" required />
                    </div>
                  </div>
                  <div class="form-group">
                    <div class="br-input">
                      <label for="cad-nascimento">Data de nascimento *</label>
                      <input id="cad-nascimento" type="date" required />
                    </div>
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <div class="br-input">
                      <label for="cad-telefone">Telefone *</label>
                      <input id="cad-telefone" type="tel" placeholder="(65) 99999-0000" required />
                    </div>
                  </div>
                  <div class="form-group">
                    <div class="br-input">
                      <label for="cad-email">E-mail *</label>
                      <input id="cad-email" type="email" placeholder="seu.email@exemplo.com" required />
                    </div>
                  </div>
                </div>

                <div class="wizard-nav">
                  <span></span>
                  <button class="br-button primary" type="button" data-wizard-next>
                    Próximo <i class="fas fa-arrow-right ml-1" aria-hidden="true"></i>
                  </button>
                </div>
              </div>

              <!-- STEP 2 — Endereço -->
              <div class="wizard-step" id="step-endereco">
                <div class="form-row">
                  <div class="form-group">
                    <div class="br-input">
                      <label for="cad-rua">Rua</label>
                      <input id="cad-rua" type="text" placeholder="Nome da rua" />
                    </div>
                  </div>
                  <div class="form-group">
                    <div class="br-input">
                      <label for="cad-numero">Número</label>
                      <input id="cad-numero" type="text" placeholder="Nº" />
                    </div>
                  </div>
                </div>

                <div class="form-group">
                  <div class="br-input">
                    <label for="cad-complemento">Complemento</label>
                    <input id="cad-complemento" type="text" placeholder="Apto, bloco, etc." />
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label for="cad-bairro" style="display:block; font-size:.875rem; font-weight:600; margin-bottom:6px;">Bairro</label>
                    <select id="cad-bairro" class="br-input" style="width:100%; padding:10px; border:1px solid #888; border-radius:4px; font-family:inherit;">
                      <option value="">Selecione o bairro</option>
                      <option value="centro">Centro</option>
                      <option value="cristo-rei">Cristo Rei</option>
                      <option value="jardim-gloria">Jardim Glória</option>
                      <option value="manga">Manga</option>
                      <option value="nova-varzea-grande">Nova Várzea Grande</option>
                      <option value="santa-isabel">Santa Isabel</option>
                      <option value="sao-mateus">São Mateus</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <div class="br-input">
                      <label for="cad-cep">CEP</label>
                      <input id="cad-cep" type="text" placeholder="78000-000" />
                    </div>
                  </div>
                </div>

                <div class="wizard-nav">
                  <button class="br-button secondary" type="button" data-wizard-prev>
                    <i class="fas fa-arrow-left mr-1" aria-hidden="true"></i> Voltar
                  </button>
                  <button class="br-button primary" type="button" data-wizard-next>
                    Próximo <i class="fas fa-arrow-right ml-1" aria-hidden="true"></i>
                  </button>
                </div>
              </div>

              <!-- STEP 3 — Segurança -->
              <div class="wizard-step" id="step-seguranca">
                <div class="form-group">
                  <div class="br-input has-icon">
                    <label for="cad-senha">Senha *</label>
                    <input id="cad-senha" type="password" placeholder="Crie uma senha segura" required />
                    <button class="br-button circle small" type="button" aria-label="Mostrar senha" onclick="togglePassword(this)">
                      <i class="fas fa-eye" aria-hidden="true"></i>
                    </button>
                  </div>
                </div>

                <div class="form-group">
                  <div class="br-input has-icon">
                    <label for="cad-senha-confirm">Confirmar senha *</label>
                    <input id="cad-senha-confirm" type="password" placeholder="Repita a senha" required />
                    <button class="br-button circle small" type="button" aria-label="Mostrar senha" onclick="togglePassword(this)">
                      <i class="fas fa-eye" aria-hidden="true"></i>
                    </button>
                  </div>
                </div>

                <div class="form-group" style="margin-top: 16px;">
                  <label class="br-checkbox">
                    <input type="checkbox" id="cad-termos" required />
                    <label for="cad-termos">
                      Li e concordo com os <a href="javascript:void(0)">Termos de Uso</a> e a
                      <a href="javascript:void(0)">Política de Privacidade</a>.
                    </label>
                  </label>
                </div>

                <div class="wizard-nav">
                  <button class="br-button secondary" type="button" data-wizard-prev>
                    <i class="fas fa-arrow-left mr-1" aria-hidden="true"></i> Voltar
                  </button>
                  <button class="br-button primary" type="submit" id="btn-cadastrar">
                    <i class="fas fa-user-check" aria-hidden="true"></i> Criar Conta
                  </button>
                </div>
              </div>

            </div>
          </form>

          <span class="br-divider my-4"></span>

          <div class="form-link">
            Já tem uma conta?
            <a href="login.html">Faça login</a>
          </div>
        </div>
      </main>

      <!-- ====== FOOTER (minimal) ====== -->
      <footer class="br-footer pt-3" id="footer">
        <div class="container-lg">
          <div class="info">
            <div class="text-down-01 text-medium pb-3 text-center">
              VG 24H — Portal de Serviços Públicos de Várzea Grande.
              Conforme o <strong>Design System Gov.br</strong>.
            </div>
          </div>
        </div>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@govbr-ds/core@3.7.0/dist/core-init.min.js"></script>
    <script src="js/vg24h.js"></script>
    <script>
      function togglePassword(btn) {
        const input = btn.parentElement.querySelector('input');
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
          input.type = 'password';
          icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
      }
    </script>
  </body>
</html>
