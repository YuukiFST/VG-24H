<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fausto Yuuki — Guia de Estudo</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --accent: #38bdf8; --accent2: #a78bfa; --text: #f1f5f9; --text2: #94a3b8;
    --green: #4ade80; --yellow: #facc15; --red: #f87171; --orange: #fb923c;
    --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
  }

  .topbar {
    background: var(--surface); padding: 12px 24px; display: flex;
    align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    border-bottom: 2px solid var(--accent2); position: sticky; top: 0; z-index: 100;
  }
  .topbar h1 { font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
  .topbar h1 span { color: var(--accent2); }
  .topbar .badge { font-size: .7rem; background: var(--accent2); color: #fff; padding: 2px 10px; border-radius: 20px; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .progress-wrap { display: flex; align-items: center; gap: 8px; font-size: .8rem; color: var(--text2); }
  .progress-bar { width: 120px; height: 6px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .3s; border-radius: 4px; }
  .btn { padding: 6px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: .8rem; font-weight: 600; transition: all .2s; }
  .btn-primary { background: var(--accent); color: #0f172a; }
  .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 1px solid var(--surface2); color: var(--text2); }
  .btn-outline:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-sm { padding: 4px 12px; font-size: .75rem; }

  .app { display: flex; flex: 1; }
  .sidebar {
    width: 240px; background: var(--surface); padding: 16px 0; flex-shrink: 0;
    overflow-y: auto; max-height: calc(100vh - 60px); border-right: 1px solid var(--surface2);
  }
  .sidebar .nav-header {
    padding: 8px 20px; font-size: .7rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text2); cursor: pointer; transition: color .2s;
  }
  .sidebar .nav-header:hover { color: var(--accent2); }
  .sidebar .nav-item {
    padding: 6px 20px 6px 28px; font-size: .82rem; color: var(--text2); cursor: pointer;
    border-left: 3px solid transparent; transition: all .2s;
  }
  .sidebar .nav-item:hover { color: var(--text); background: rgba(255,255,255,.04); }
  .sidebar .nav-item.active { color: var(--accent2); border-left-color: var(--accent2); background: rgba(167,139,250,.08); }

  .main { flex: 1; padding: 32px 40px; overflow-y: auto; max-height: calc(100vh - 60px); }
  .section { display: none; animation: fadeIn .3s ease; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .section h2 { font-size: 1.6rem; margin-bottom: 4px; color: var(--accent2); }
  .section .subtitle { color: var(--text2); margin-bottom: 24px; font-size: .9rem; }

  .card { background: var(--surface); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 16px; border: 1px solid var(--surface2); transition: border-color .2s; }
  .card:hover { border-color: #475569; }
  .card h3 { font-size: 1rem; color: var(--accent2); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .card h3 .tag { font-size: .65rem; background: var(--accent2); color: #fff; padding: 1px 8px; border-radius: 10px; text-transform: uppercase; }
  .card p, .card li { font-size: .88rem; line-height: 1.6; color: var(--text2); }
  .card ul { padding-left: 20px; }
  .card strong { color: var(--text); }

  .highlight { background: rgba(167,139,250,.12); border-left: 3px solid var(--accent2); padding: 12px 16px; border-radius: 0 8px 8px 0; margin: 12px 0; font-size: .85rem; }
  .highlight.warn { border-left-color: var(--yellow); background: rgba(250,204,21,.08); }
  .highlight.err { border-left-color: var(--red); background: rgba(248,113,113,.08); }
  .highlight.ok { border-left-color: var(--green); background: rgba(74,222,128,.08); }

  table { width: 100%; border-collapse: collapse; font-size: .85rem; margin: 12px 0; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--surface2); }
  th { color: var(--accent2); font-weight: 600; font-size: .75rem; text-transform: uppercase; letter-spacing: .5px; }
  td { color: var(--text2); }
  tr:hover td { background: rgba(255,255,255,.03); }

  code { background: #1e1e2e; color: #cdd6f4; padding: 1px 6px; border-radius: 4px; font-size: .8rem; font-family: 'JetBrains Mono', 'Fira Code', monospace; }
  pre { background: #1e1e2e; border-radius: var(--radius); padding: 16px 20px; overflow-x: auto; margin: 12px 0; font-size: .8rem; line-height: 1.5; }
  pre code { background: none; padding: 0; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  .stat { text-align: center; padding: 20px; }
  .stat .num { font-size: 2rem; font-weight: 700; color: var(--accent2); }
  .stat .label { font-size: .75rem; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }

  .flashcard-area { display: none; }
  .flashcard-area.active { display: block; }
  .flashcard {
    background: var(--surface); border-radius: var(--radius); padding: 40px; text-align: center;
    border: 2px solid var(--surface2); cursor: pointer; min-height: 200px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: all .3s; user-select: none; margin-bottom: 16px;
  }
  .flashcard:hover { border-color: var(--accent2); transform: scale(1.01); }
  .flashcard .front { font-size: 1.2rem; color: var(--accent2); font-weight: 600; }
  .flashcard .back { font-size: 1rem; color: var(--text2); line-height: 1.6; }
  .flashcard .hint { font-size: .75rem; color: var(--text2); margin-top: 16px; opacity: .5; }
  .fc-controls { display: flex; justify-content: center; gap: 12px; margin: 16px 0; flex-wrap: wrap; }

  .search-box { position: relative; margin-bottom: 24px; }
  .search-box input {
    width: 100%; padding: 10px 16px 10px 40px; border-radius: 10px; border: 1px solid var(--surface2);
    background: var(--surface); color: var(--text); font-size: .9rem; outline: none; transition: border .2s;
  }
  .search-box input:focus { border-color: var(--accent2); }
  .search-box .ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { padding: 16px; }
    .topbar { padding: 10px 16px; }
    .sidebar-toggle { display: block; }
    .sidebar.open { display: block; position: fixed; top: 60px; left: 0; bottom: 0; z-index: 99; width: 280px; }
  }
  .sidebar-toggle { display: none; background: none; border: none; color: var(--text); font-size: 1.2rem; cursor: pointer; }

  .siglas { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
  .sigla { padding: 4px 14px; border-radius: 20px; font-size: .8rem; font-weight: 700; }
  .sigla.ab { background: #3b82f6; color: #fff; }
  .sigla.ea { background: #f59e0b; color: #fff; }
  .sigla.ee { background: #8b5cf6; color: #fff; }
  .sigla.co { background: #10b981; color: #fff; }
  .sigla.ca { background: #ef4444; color: #fff; }

  .tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 8px 16px; border-radius: 8px; background: var(--surface2); color: var(--text2); cursor: pointer; font-size: .8rem; transition: all .2s; border: none; }
  .tab:hover { background: #475569; }
  .tab.active { background: var(--accent2); color: #fff; font-weight: 600; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .semaforo { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0; }
  .semaforo .card-mini { padding: 12px 20px; border-radius: 10px; text-align: center; min-width: 100px; }
  .semaforo .card-mini .num { font-size: 1.6rem; font-weight: 700; }
  .semaforo .card-mini .label { font-size: .7rem; text-transform: uppercase; letter-spacing: .5px; }
  .semaforo .green { background: rgba(74,222,128,.15); border: 1px solid var(--green); color: var(--green); }
  .semaforo .yellow { background: rgba(250,204,21,.15); border: 1px solid var(--yellow); color: var(--yellow); }
  .semaforo .red { background: rgba(248,113,113,.15); border: 1px solid var(--red); color: var(--red); }
  .semaforo .total { background: rgba(56,189,248,.15); border: 1px solid var(--accent); color: var(--accent); }

  .mnemonic { background: rgba(167,139,250,.1); border: 1px dashed var(--accent2); border-radius: var(--radius); padding: 16px 20px; margin: 12px 0; }
  .mnemonic strong { color: var(--accent2); }

  .btn-ghost { background: transparent; border: 1px dashed var(--surface2); color: var(--text2); padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: .8rem; transition: all .2s; }
  .btn-ghost:hover { border-color: var(--accent2); color: var(--accent2); }
</style>
</head>
<body>

<header class="topbar">
  <div style="display:flex;align-items:center;gap:12px">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <h1>🎨 <span>Fausto Yuuki</span> <small style="font-weight:400;color:var(--text2);font-size:.8rem">— Guia de Estudo</small></h1>
    <span class="badge">COL + GES + Frontend</span>
  </div>
  <div class="topbar-right">
    <div class="progress-wrap">
      <span id="progressPct">0%</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <button class="btn btn-outline btn-sm" onclick="toggleQuiz()">🎯 Quiz</button>
    <button class="btn btn-primary btn-sm" onclick="resetChecks()">↻ Resetar</button>
  </div>
</header>

<div class="app">
  <nav class="sidebar" id="sidebar"><div id="sidebarNav"></div></nav>
  <main class="main" id="mainContent"></main>
</div>

<script>
const DATA = {

  frontend: {

        <div class="grid-2">
          <div>
            <p><strong>Estruturais:</strong></p>
            <ul>
              <li><code>br-skiplink</code> — acessibilidade</li>

  moduloCol: {

let currentSection = 'overview';
let quizActive = false;
let quizIndex = 0;
let quizFlipped = false;
let completedChecks = new Set();

function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  let html = '';
  html += '<div class="nav-header" onclick="navigate(\'overview\')" style="font-size:.82rem;text-transform:none;letter-spacing:0">🏠 Visão Geral</div>';
  for (const [key, d] of Object.entries(DATA)) {
    if (key === 'overview') continue;
    html += '<div class="nav-header" onclick="navigate(\'' + key + '\')" style="font-size:.82rem;text-transform:none;letter-spacing:0">' + d.title + '</div>';
  }
  nav.innerHTML = html;
}
function renderMain() {
  const main = document.getElementById('mainContent');
  if (quizActive) { renderQuiz(); return; }
  const d = DATA[currentSection];
  if (!d) return;
  main.innerHTML = '<div class="search-box"><span class="ico">🔍</span><input type="text" placeholder="Buscar nesta seção..." oninput="searchContent(this.value)"></div><h2>' + d.title + '</h2><p class="subtitle">' + d.subtitle + '</p>' + d.content;
  document.querySelectorAll('#checklist input').forEach(cb => { const l = cb.parentElement.textContent.trim(); if (completedChecks.has(l)) cb.checked = true; });
}
function navigate(key) { currentSection = key; quizActive = false; renderSidebar(); renderMain(); document.getElementById('sidebar').classList.remove('open'); }

function toggleQuiz() { quizActive = !quizActive; if (quizActive) { quizIndex = 0; quizFlipped = false; } renderMain(); }
function renderQuiz() {
  const main = document.getElementById('mainContent');
  const q = QUIZ[quizIndex];
  if (!q) {
    main.innerHTML = '<div class="card" style="text-align:center;padding:60px"><h2 style="font-size:2rem;margin-bottom:16px">🎉</h2><h3>Quiz completo!</h3><p style="color:var(--text2);margin:16px 0">' + QUIZ.length + ' perguntas.</p><button class="btn btn-primary" onclick="quizIndex=0;quizFlipped=false;renderQuiz()">🔄 Recomeçar</button><button class="btn btn-outline" onclick="toggleQuiz()">Voltar</button></div>';
    return;
  }
  main.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px"><h2>🎯 Quiz</h2><span style="color:var(--text2);font-size:.85rem">' + (quizIndex+1) + ' / ' + QUIZ.length + '</span></div><div class="progress-bar" style="width:100%;margin-bottom:24px"><div class="progress-fill" style="width:' + ((quizIndex+1)/QUIZ.length*100) + '%"></div></div><div class="flashcard" onclick="flipQuiz()">' + (!quizFlipped ? '<div class="front">' + q.q + '</div><div class="hint">👆 Clique para resposta</div>' : '<div class="back">' + q.a + '</div><div class="hint">👆 Clique para pergunta</div>') + '</div><div class="fc-controls"><button class="btn btn-outline" onclick="prevQuiz()"' + (quizIndex===0?' disabled style="opacity:.4"':'') + '>◀ Anterior</button><button class="btn btn-primary" onclick="nextQuiz()">Próxima ▶</button></div><div style="text-align:center"><button class="btn-ghost" onclick="toggleQuiz()">← Voltar</button></div>';
}
function flipQuiz() { quizFlipped = !quizFlipped; renderQuiz(); }
function nextQuiz() { if (quizIndex < QUIZ.length - 1) { quizIndex++; quizFlipped = false; renderQuiz(); } }
function prevQuiz() { if (quizIndex > 0) { quizIndex--; quizFlipped = false; renderQuiz(); } }

function updateProgress() {
  const checks = document.querySelectorAll('#checklist input');
  const done = Array.from(checks).filter(c => c.checked).length;
  checks.forEach(c => { const l = c.parentElement.textContent.trim(); if (c.checked) completedChecks.add(l); else completedChecks.delete(l); });
  const pct = Math.round((done / (checks.length || 1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}
function resetChecks() { completedChecks.clear(); document.querySelectorAll('#checklist input').forEach(c => c.checked = false); updateProgress(); }
function searchContent(val) {
  const q = val.toLowerCase().trim();
  document.querySelectorAll('.card').forEach(c => { c.style.display = (!q || c.textContent.toLowerCase().includes(q)) ? '' : 'none'; });
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

renderSidebar();
renderMain();
updateProgress();
</script>
