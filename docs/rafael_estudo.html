<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rafael Pereira — Guia de Estudo BD</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --accent: #38bdf8; --accent2: #818cf8; --text: #f1f5f9; --text2: #94a3b8;
    --green: #4ade80; --yellow: #facc15; --red: #f87171; --orange: #fb923c;
    --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
  }

  /* ─── TOP BAR ─── */
  .topbar {
    background: var(--surface); padding: 12px 24px; display: flex;
    align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 100;
  }
  .topbar h1 { font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
  .topbar h1 span { color: var(--accent); }
  .topbar .badge { font-size: .7rem; background: var(--accent2); color: #fff; padding: 2px 10px; border-radius: 20px; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .progress-wrap { display: flex; align-items: center; gap: 8px; font-size: .8rem; color: var(--text2); }
  .progress-bar { width: 120px; height: 6px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .3s; border-radius: 4px; }
  .btn { padding: 6px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: .8rem; font-weight: 600; transition: all .2s; }
  .btn-primary { background: var(--accent); color: #0f172a; }
  .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 1px solid var(--surface2); color: var(--text2); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { padding: 4px 12px; font-size: .75rem; }

  /* ─── LAYOUT ─── */
  .app { display: flex; flex: 1; }
  .sidebar {
    width: 240px; background: var(--surface); padding: 16px 0; flex-shrink: 0;
    overflow-y: auto; max-height: calc(100vh - 60px); border-right: 1px solid var(--surface2);
  }
  .sidebar .nav-section { margin-bottom: 4px; }
  .sidebar .nav-header {
    padding: 8px 20px; font-size: .7rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text2); cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    transition: color .2s;
  }
  .sidebar .nav-header:hover { color: var(--accent); }
  .sidebar .nav-header .arrow { font-size: .6rem; transition: transform .2s; }
  .sidebar .nav-header.collapsed .arrow { transform: rotate(-90deg); }
  .sidebar .nav-items { list-style: none; }
  .sidebar .nav-items.collapsed { display: none; }
  .sidebar .nav-item {
    padding: 6px 20px 6px 28px; font-size: .82rem; color: var(--text2); cursor: pointer;
    border-left: 3px solid transparent; transition: all .2s; position: relative;
  }
  .sidebar .nav-item:hover { color: var(--text); background: rgba(255,255,255,.04); }
  .sidebar .nav-item.active {
    color: var(--accent); border-left-color: var(--accent); background: rgba(56,189,248,.08);
  }
  .sidebar .nav-item .check { position: absolute; right: 16px; color: var(--green); font-size: .7rem; }

  .main { flex: 1; padding: 32px 40px; overflow-y: auto; max-height: calc(100vh - 60px); }

  /* ─── CONTENT ─── */
  .section { display: none; animation: fadeIn .3s ease; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .section h2 { font-size: 1.6rem; margin-bottom: 4px; color: var(--accent); }
  .section .subtitle { color: var(--text2); margin-bottom: 24px; font-size: .9rem; }

  .card { background: var(--surface); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 16px; border: 1px solid var(--surface2); transition: border-color .2s; }
  .card:hover { border-color: #475569; }
  .card h3 { font-size: 1rem; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .card h3 .tag { font-size: .65rem; background: var(--accent2); color: #fff; padding: 1px 8px; border-radius: 10px; text-transform: uppercase; }
  .card p, .card li { font-size: .88rem; line-height: 1.6; color: var(--text2); }
  .card ul { padding-left: 20px; }
  .card strong { color: var(--text); }

  .highlight { background: rgba(56,189,248,.12); border-left: 3px solid var(--accent); padding: 12px 16px; border-radius: 0 8px 8px 0; margin: 12px 0; font-size: .85rem; }
  .highlight.warn { border-left-color: var(--yellow); background: rgba(250,204,21,.08); }
  .highlight.err { border-left-color: var(--red); background: rgba(248,113,113,.08); }
  .highlight.ok { border-left-color: var(--green); background: rgba(74,222,128,.08); }

  table { width: 100%; border-collapse: collapse; font-size: .85rem; margin: 12px 0; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--surface2); }
  th { color: var(--accent); font-weight: 600; font-size: .75rem; text-transform: uppercase; letter-spacing: .5px; }
  td { color: var(--text2); }
  tr:hover td { background: rgba(255,255,255,.03); }

  code { background: #1e1e2e; color: #cdd6f4; padding: 1px 6px; border-radius: 4px; font-size: .8rem; font-family: 'JetBrains Mono', 'Fira Code', monospace; }
  pre { background: #1e1e2e; border-radius: var(--radius); padding: 16px 20px; overflow-x: auto; margin: 12px 0; font-size: .8rem; line-height: 1.5; }
  pre code { background: none; padding: 0; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  .stat { text-align: center; padding: 20px; }
  .stat .num { font-size: 2rem; font-weight: 700; color: var(--accent); }
  .stat .label { font-size: .75rem; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }

  /* ─── FLASHCARD ─── */
  .flashcard-area { display: none; }
  .flashcard-area.active { display: block; }
  .flashcard {
    background: var(--surface); border-radius: var(--radius); padding: 40px; text-align: center;
    border: 2px solid var(--surface2); cursor: pointer; min-height: 200px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: all .3s; user-select: none; margin-bottom: 16px;
  }
  .flashcard:hover { border-color: var(--accent); transform: scale(1.01); }
  .flashcard .front { font-size: 1.2rem; color: var(--accent); font-weight: 600; }
  .flashcard .back { font-size: 1rem; color: var(--text2); line-height: 1.6; }
  .flashcard .hint { font-size: .75rem; color: var(--text2); margin-top: 16px; opacity: .5; }

  .fc-controls { display: flex; justify-content: center; gap: 12px; margin: 16px 0; flex-wrap: wrap; }

  /* ─── SEARCH ─── */
  .search-box { position: relative; margin-bottom: 24px; }
  .search-box input {
    width: 100%; padding: 10px 16px 10px 40px; border-radius: 10px; border: 1px solid var(--surface2);
    background: var(--surface); color: var(--text); font-size: .9rem; outline: none; transition: border .2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box .ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { padding: 16px; }
    .topbar { padding: 10px 16px; }
    .topbar h1 { font-size: 1rem; }
  }
  .sidebar-toggle { display: none; background: none; border: none; color: var(--text); font-size: 1.2rem; cursor: pointer; }
  @media (max-width: 768px) {
    .sidebar-toggle { display: block; }
    .sidebar.open { display: block; position: fixed; top: 60px; left: 0; bottom: 0; z-index: 99; width: 280px; }
  }

  .siglas { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
  .sigla { padding: 4px 14px; border-radius: 20px; font-size: .8rem; font-weight: 700; }
  .sigla.ab { background: #3b82f6; color: #fff; }
  .sigla.ea { background: #f59e0b; color: #fff; }
  .sigla.ee { background: #8b5cf6; color: #fff; }
  .sigla.co { background: #10b981; color: #fff; }
  .sigla.ca { background: #ef4444; color: #fff; }

  .tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 8px 16px; border-radius: 8px; background: var(--surface2); color: var(--text2); cursor: pointer; font-size: .8rem; transition: all .2s; border: none; }
  .tab:hover { background: #475569; }
  .tab.active { background: var(--accent); color: #0f172a; font-weight: 600; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .mnemonic { background: rgba(129,140,248,.1); border: 1px dashed var(--accent2); border-radius: var(--radius); padding: 16px 20px; margin: 12px 0; }
  .mnemonic strong { color: var(--accent2); }

  .btn-ghost { background: transparent; border: 1px dashed var(--surface2); color: var(--text2); padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: .8rem; transition: all .2s; }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .progress-dots { display: flex; gap: 6px; flex-wrap: wrap; margin: 16px 0; }
  .progress-dots .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--surface2); cursor: pointer; transition: all .2s; }
  .progress-dots .dot.done { background: var(--green); }
  .progress-dots .dot.current { background: var(--accent); box-shadow: 0 0 0 3px rgba(56,189,248,.3); }

  .card pre { max-height: 300px; overflow-y: auto; }
</style>
</head>
<body>

<!-- ─── TOPBAR ─── -->
<header class="topbar">
  <div style="display:flex;align-items:center;gap:12px">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <h1>📘 <span>Rafael Pereira</span> <small style="font-weight:400;color:var(--text2);font-size:.8rem">— Guia de Estudo</small></h1>
    <span class="badge">Banco de Dados</span>
  </div>
  <div class="topbar-right">
    <div class="progress-wrap">
      <span id="progressPct">0%</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <button class="btn btn-outline btn-sm" onclick="toggleQuiz()">🎯 Quiz Rápido</button>
    <button class="btn btn-primary btn-sm" onclick="resetChecks()">↻ Resetar</button>
  </div>
</header>

<div class="app">
  <!-- ─── SIDEBAR ─── -->
  <nav class="sidebar" id="sidebar">
    <div id="sidebarNav"></div>
  </nav>

  <!-- ─── MAIN ─── -->
  <main class="main" id="mainContent"></main>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  DATA — conteúdo completo estruturado
// ═══════════════════════════════════════════════════════════

const DATA = {
  overview: {
    title: "Visão Geral",
    subtitle: "O que você precisa saber — visão de 30 segundos",
    content: `
      <div class="grid-3">
        <div class="card stat"><div class="num">11</div><div class="label">Tabelas</div></div>
        <div class="card stat"><div class="num">6</div><div class="label">Scripts SQL</div></div>
        <div class="card stat"><div class="num">7</div><div class="label">Triggers + Rules</div></div>
      </div>
      <div class="card">
        <h3>🎯 Sua responsabilidade</h3>
        <p><strong>Banco de Dados + Backend Core</strong> — schema, triggers, rules, views, seed, models, middleware, decorators, utils, config.</p>
      </div>
      <div class="card">
        <h3>⚡ Decisão arquitetural mais importante</h3>
        <div class="highlight">
          <strong>Status do chamado NÃO é campo direto</strong> na tabela <code>chamado</code>. Ele é determinado pelo <strong>último registro de <code>historico_chamado</code></strong>. Todo histórico de status fica rastreável.
        </div>
        <p>No model Django, usamos <strong>3 properties</strong> em vez de um campo <code>id_status</code>:</p>
        <ul>
          <li><code>status_atual</code> → retorna o <code>StatusChamado</code> do último histórico</li>
          <li><code>sigla_status</code> → retorna a sigla (AB, EA, EE, CO, CA)</li>
          <li><code>atualizado_em</code> → retorna <code>dt_alteracao</code> do último histórico</li>
        </ul>
      </div>
      <div class="card">
        <h3>📌 Siglas de Status</h3>
        <div class="siglas">
          <span class="sigla ab">AB = Aberto</span>
          <span class="sigla ea">EA = Em Análise</span>
          <span class="sigla ee">EE = Em Execução</span>
          <span class="sigla co">CO = Concluído</span>
          <span class="sigla ca">CA = Cancelado</span>
        </div>
      </div>
    `
  },

  // ─── 1. MODELAGEM ───
  modelagem: {
    title: "1. Modelagem de Dados",
    subtitle: "11 entidades — Seção 5 do Plano",
    content: `
      <div class="card">
        <h3>📊 As 11 Tabelas</h3>
        <table>
          <tr><th>#</th><th>Tabela</th><th>Descrição</th></tr>
          <tr><td>1</td><td><code>cidadao</code></td><td>Cidadãos (<code>perfil = 'CID'</code>)</td></tr>
          <tr><td>2</td><td><code>servidor</code></td><td>Colaboradores (<code>COL</code>) e Gestores (<code>GES</code>). FK → <code>secretaria</code></td></tr>
          <tr><td>3</td><td><code>secretaria</code></td><td>Secretarias municipais</td></tr>
          <tr><td>4</td><td><code>status_chamado</code></td><td>5 status: AB, EA, EE, CO, CA</td></tr>
          <tr><td>5</td><td><code>categoria_servico</code></td><td>Categorias de serviço. FK → <code>secretaria</code></td></tr>
          <tr><td>6</td><td><code>servico</code></td><td>Serviços com prazos amarelo/vermelho. FK → <code>categoria_servico</code></td></tr>
          <tr><td>7</td><td><code>bairro</code></td><td>Bairros de VG com CEP e região</td></tr>
          <tr><td>8</td><td><code>chamado</code></td><td><strong>Entidade central. SEM <code>id_status</code></strong> — status vem do histórico</td></tr>
          <tr><td>9</td><td><code>foto_chamado</code></td><td>Fotos (URL Cloudinary). FK → chamado</td></tr>
          <tr><td>10</td><td><code>historico_chamado</code></td><td><strong>Fonte da verdade para o status atual</strong></td></tr>
          <tr><td>11</td><td><code>notificacao</code></td><td>Avisos ao cidadão (lida, arquivada)</td></tr>
        </table>
      </div>
      <div class="card">
        <h3>🧠 Mnemônico para decorar as 11 tabelas</h3>
        <div class="mnemonic">
          <strong>C</strong>idadao + <strong>S</strong>ervidor + <strong>S</strong>ecretaria = CSS<br>
          <strong>S</strong>tatus + <strong>C</strong>ategoria + <strong>S</strong>ervico = SCS<br>
          <strong>B</strong>airro + <strong>C</strong>hamado = BC<br>
          <strong>F</strong>oto + <strong>H</strong>istorico + <strong>N</strong>otificacao = FHN<br><br>
          <strong>Frase:</strong> "<em>CSS + SCS + BC + FHN = 3+3+2+3 = 11 tabelas</em>"
        </div>
      </div>
      <div class="card">
        <h3>🔗 Relacionamentos principais</h3>
        <ul>
          <li><code>chamado</code> → FK para <code>cidadao</code>, <code>servidor</code> (opcional), <code>servico</code>, <code>bairro</code></li>
          <li><code>historico_chamado</code> → FK para <code>chamado</code> e <code>status_chamado</code></li>
          <li><code>foto_chamado</code> → FK para <code>chamado</code></li>
          <li><code>notificacao</code> → FK para <code>cidadao</code></li>
          <li><code>categoria_servico</code> → FK para <code>secretaria</code></li>
          <li><code>servico</code> → FK para <code>categoria_servico</code></li>
        </ul>
      </div>
    `
  },

  // ─── 2. SCRIPTS SQL ───
  scripts: {
    title: "2. Scripts SQL",
    subtitle: "O que cada arquivo faz — da pasta database/",
    content: `
      <div class="tabs" id="sqlTabs">
        <button class="tab active" data-tab="schema">01_schema</button>
        <button class="tab" data-tab="seed">02_seed</button>
        <button class="tab" data-tab="triggers">03_triggers</button>
        <button class="tab" data-tab="rules">04_rules</button>
        <button class="tab" data-tab="views">05_views</button>
        <button class="tab" data-tab="fix">fix_rules</button>
      </div>

      <div class="tab-content active" id="tab-schema">
        <div class="card">
          <h3>📄 <code>01_schema.sql</code> (191 linhas)</h3>
          <ul>
            <li>11 <code>CREATE TABLE</code> com PKs, FKs, constraints</li>
            <li><strong><code>chamado</code> NÃO tem <code>id_status</code></strong> — FK foi removida. Status = último histórico</li>
            <li><code>CHECK (sigla IN ('AB', 'EA', 'EE', 'CO', 'CA'))</code> em <code>status_chamado</code></li>
            <li>6 índices de performance (não existe <code>ix_chamado_status</code>)</li>
          </ul>
        </div>
      </div>

      <div class="tab-content" id="tab-seed">
        <div class="card">
          <h3>📄 <code>02_seed.sql</code></h3>
          <ul>
            <li>5 status: AB, EA, EE, CO, CA</li>
            <li>1 secretaria, 2 categorias, 5 serviços, 20 bairros</li>
          </ul>
        </div>
      </div>

      <div class="tab-content" id="tab-triggers">
        <div class="card">
          <h3>📄 <code>03_functions_triggers.sql</code> (107 linhas)</h3>

          <h4 style="margin:16px 0 8px;color:var(--accent)">🔹 Trigger 1 — <code>trg_chamado_after_insert_historico_ab</code></h4>
          <ul>
            <li><code>AFTER INSERT</code> em <code>chamado</code></li>
            <li>Função <code>fn_chamado_after_insert_historico_ab()</code>: insere em <code>historico_chamado</code> com status AB</li>
            <li><strong>Garante:</strong> todo chamado nasce com ao menos 1 histórico</li>
          </ul>
          <pre><code>CREATE OR REPLACE FUNCTION fn_chamado_after_insert_historico_ab()
RETURNS TRIGGER AS $$
BEGIN
  INSERT INTO historico_chamado (id_chamado, id_status, observacao)
  VALUES (NEW.id_chamado, (SELECT id_status FROM status_chamado WHERE sigla = 'AB'), 'Chamado aberto');
  RETURN NEW;
END;
$$ LANGUAGE plpgsql;

CREATE TRIGGER trg_chamado_after_insert_historico_ab
AFTER INSERT ON chamado
FOR EACH ROW EXECUTE FUNCTION fn_chamado_after_insert_historico_ab();</code></pre>

          <h4 style="margin:16px 0 8px;color:var(--accent)">🔹 Trigger 2A — <code>trg_chamado_before_update_metadados</code></h4>
          <ul>
            <li><code>BEFORE UPDATE</code> em <code>chamado</code></li>
            <li>Função <code>fn_chamado_before_update_metadados()</code>: atualiza <code>atualizado_em = CURRENT_TIMESTAMP</code></li>
          </ul>
          <pre><code>CREATE OR REPLACE FUNCTION fn_chamado_before_update_metadados()
RETURNS TRIGGER AS $$
BEGIN
  NEW.atualizado_em = CURRENT_TIMESTAMP;
  RETURN NEW;
END;
$$ LANGUAGE plpgsql;</code></pre>

          <h4 style="margin:16px 0 8px;color:var(--accent)">🔹 Trigger 2B — <code>trg_historico_after_insert_status</code></h4>
          <div class="highlight">
            <strong>Mudança importante:</strong> agora é <code>AFTER INSERT</code> em <code>historico_chamado</code> (antes era AFTER UPDATE em chamado).
          </div>
          <ul>
            <li>Função <code>fn_historico_after_insert_status()</code>:</li>
            <li>1. Busca a sigla e descrição do status inserido</li>
            <li>2. Se CO ou CA → atualiza <code>dt_conclusao</code> no chamado</li>
            <li>3. Se AB, EA ou EE → limpa <code>dt_conclusao = NULL</code></li>
            <li>4. Gera notificação automática: <code>"Chamado XXXX: status alterado para Descrição"</code></li>
          </ul>
          <pre><code>CREATE OR REPLACE FUNCTION fn_historico_after_insert_status()
RETURNS TRIGGER AS $$
DECLARE
  v_sigla CHAR(2);
  v_descricao VARCHAR(50);
BEGIN
  SELECT sigla, descricao INTO v_sigla, v_descricao
  FROM status_chamado WHERE id_status = NEW.id_status;

  IF v_sigla IN ('CO', 'CA') THEN
    UPDATE chamado SET dt_conclusao = CURRENT_TIMESTAMP WHERE id_chamado = NEW.id_chamado;
  ELSE
    UPDATE chamado SET dt_conclusao = NULL WHERE id_chamado = NEW.id_chamado;
  END IF;

  INSERT INTO notificacao (id_cidadao, mensagem)
  SELECT id_cidadao, 'Chamado ' || NEW.id_chamado || ': status alterado para ' || v_descricao
  FROM chamado WHERE id_chamado = NEW.id_chamado;
  RETURN NEW;
END;
$$ LANGUAGE plpgsql;</code></pre>
        </div>
      </div>

      <div class="tab-content" id="tab-rules">
        <div class="card">
          <h3>📄 <code>04_rules.sql</code> (126 linhas)</h3>
          <div class="highlight warn">
            <strong>⚠️ Mudança importante:</strong> R1, R2 e R3 foram <strong>convertidas para Triggers BEFORE</strong> com <code>RAISE EXCEPTION</code> (erro explícito) em vez de <code>DO INSTEAD NOTHING</code> (falha silenciosa).
          </div>
          <table>

SELECT
  cs.descricao AS categoria,
  b.nome AS bairro,
  sc.sigla AS sigla_status,
  sc.descricao AS status_descricao,
  COUNT(*) AS total
FROM chamado c
JOIN servico s ON c.id_servico = s.id_servico
JOIN categoria_servico cs ON s.id_categoria = cs.id_categoria
JOIN bairro b ON c.id_bairro = b.id_bairro

  SELECT hc.id_status
  FROM historico_chamado hc
  WHERE hc.id_chamado = c.id_chamado
  ORDER BY hc.dt_alteracao DESC
  LIMIT 1
) ult
JOIN status_chamado sc ON ult.id_status = sc.id_status

        <pre><code>-- ANTES (Rule — falha silenciosa):
CREATE RULE trg_foto_chamado_encerrado AS
ON INSERT TO foto_chamado
WHERE EXISTS (...)
DO INSTEAD NOTHING;

-- DEPOIS (Trigger — erro explícito):
CREATE OR REPLACE FUNCTION fn_foto_chamado_encerrado()
RETURNS TRIGGER AS $$
BEGIN
  IF EXISTS (SELECT 1 FROM ... WHERE sigla IN ('CO','CA')) THEN
    RAISE EXCEPTION 'Chamado já encerrado';
  END IF;
  RETURN NEW;
END;
$$ LANGUAGE plpgsql;</code></pre>

// ═══════════════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════════════

let currentSection = 'overview';
let quizActive = false;
let quizIndex = 0;
let quizFlipped = false;
let completedChecks = new Set();

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════

function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  const keys = Object.keys(DATA);
  let html = '';
  html += `<div class="nav-section">
    <div class="nav-header" onclick="navigate('overview')">
      🏠 Visão Geral <span class="arrow">▾</span>
    </div>
  </div>`;
  for (const key of keys) {
    if (key === 'overview') continue;
    const d = DATA[key];
    html += `<div class="nav-section">
      <div class="nav-header ${key === currentSection ? '' : 'collapsed'}" onclick="navigate('${key}')">
        ${d.title.split(' ').slice(1).join(' ')} <span class="arrow">▾</span>
      </div>
    </div>`;
  }
  nav.innerHTML = html;
  updateNavActive();
}

function updateNavActive() {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const active = document.querySelector(`.nav-item[data-section="${currentSection}"]`);
  if (active) active.classList.add('active');
  // highlight the section header
  document.querySelectorAll('.nav-header').forEach(h => h.style.color = '');
  const headers = document.querySelectorAll('.nav-header');
  // Find the header whose text matches current section
  const d = DATA[currentSection];
  if (d) {
    headers.forEach(h => {
      if (h.textContent.trim().includes(d.title.split(' ').slice(1).join(' '))) {
        h.style.color = 'var(--accent)';
      }
    });
  }
}

function renderMain() {
  const main = document.getElementById('mainContent');
  if (quizActive) {
    renderQuiz();
    return;
  }
  const d = DATA[currentSection];
  if (!d) return;
  main.innerHTML = `
    <div class="search-box">
      <span class="ico">🔍</span>
      <input type="text" placeholder="Buscar nesta seção..." oninput="searchContent(this.value)">
    </div>
    <h2>${d.title}</h2>
    <p class="subtitle">${d.subtitle}</p>
    ${d.content}
    ${currentSection === 'pontos' ? `<div class="progress-dots" id="progressDots"></div>` : ''}
  `;
  // re-trigger tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('tab-' + this.dataset.tab).classList.add('active');
    });
  });
  // restore checklist
  document.querySelectorAll('#checklist input').forEach(cb => {
    const label = cb.parentElement.textContent.trim();
    if (completedChecks.has(label)) cb.checked = true;
  });
}

function navigate(key) {
  currentSection = key;
  quizActive = false;
  renderSidebar();
  renderMain();
  // close sidebar on mobile
  document.getElementById('sidebar').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════
//  QUIZ
// ═══════════════════════════════════════════════════════════

function toggleQuiz() {
  quizActive = !quizActive;
  if (quizActive) {
    quizIndex = 0;
    quizFlipped = false;
  }
  renderMain();
}

function renderQuiz() {
  const main = document.getElementById('mainContent');
  const q = QUIZ[quizIndex];
  if (!q) {
    main.innerHTML = `
      <div class="card" style="text-align:center;padding:60px">
        <h2 style="font-size:2rem;margin-bottom:16px">🎉</h2>
        <h3>Você completou o quiz!</h3>
        <p style="color:var(--text2);margin:16px 0">${QUIZ.length} perguntas respondidas.</p>
        <button class="btn btn-primary" onclick="quizIndex=0;quizFlipped=false;renderQuiz()">🔄 Recomeçar</button>
        <button class="btn btn-outline" onclick="toggleQuiz()">Voltar ao estudo</button>
      </div>
    `;
    return;
  }
  main.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <h2>🎯 Quiz Rápido</h2>
      <span style="color:var(--text2);font-size:.85rem">${quizIndex + 1} / ${QUIZ.length}</span>
    </div>
    <div class="progress-bar" style="width:100%;margin-bottom:24px"><div class="progress-fill" style="width:${((quizIndex + 1) / QUIZ.length) * 100}%"></div></div>
    <div class="flashcard" onclick="flipQuiz()">
      ${!quizFlipped
        ? `<div class="front">${q.q}</div><div class="hint">👆 Clique para ver a resposta</div>`
        : `<div class="back">${q.a}</div><div class="hint">👆 Clique para voltar à pergunta</div>`
      }
    </div>
    <div class="fc-controls">
      <button class="btn btn-outline" onclick="prevQuiz()" ${quizIndex === 0 ? 'disabled style="opacity:.4"' : ''}>◀ Anterior</button>
      <button class="btn btn-primary" onclick="nextQuiz()">Próxima ▶</button>
    </div>
    <div style="text-align:center">
      <button class="btn-ghost" onclick="toggleQuiz()">← Voltar ao estudo</button>
    </div>
  `;
}

function flipQuiz() {
  quizFlipped = !quizFlipped;
  renderQuiz();
}

function nextQuiz() {
  if (quizIndex < QUIZ.length - 1) { quizIndex++; quizFlipped = false; renderQuiz(); }
}
function prevQuiz() {
  if (quizIndex > 0) { quizIndex--; quizFlipped = false; renderQuiz(); }
}

// ═══════════════════════════════════════════════════════════
//  PROGRESS & SEARCH
// ═══════════════════════════════════════════════════════════

function updateProgress() {
  const checks = document.querySelectorAll('#checklist input');
  const done = Array.from(checks).filter(c => c.checked).length;
  checks.forEach(c => {
    const label = c.parentElement.textContent.trim();
    if (c.checked) completedChecks.add(label);
    else completedChecks.delete(label);
  });
  const total = checks.length || 1;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}

function resetChecks() {
  completedChecks.clear();
  document.querySelectorAll('#checklist input').forEach(c => c.checked = false);
  updateProgress();
}

function searchContent(val) {
  const cards = document.querySelectorAll('.card');
  const q = val.toLowerCase().trim();
  cards.forEach(card => {
    if (!q) { card.style.display = ''; return; }
    card.style.display = card.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════

renderSidebar();
renderMain();
updateProgress();
</script>
</body>
</html>
