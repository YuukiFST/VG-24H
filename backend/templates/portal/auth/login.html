{% extends "portal/base.html" %}
{% block title %}Entrar{% endblock %}
{% block content %}
  <h1 class="mb-4">Acesso ao portal</h1>
  <form method="post" action="{% url 'portal:login' %}" class="col-md-6">
    {% csrf_token %}
    <div class="br-input mb-3">
      <label for="id_email">E-mail</label>
      <input type="email" name="email" id="id_email" required autocomplete="username" />
    </div>
    <div class="br-input mb-3">
      <label for="id_password">Senha</label>
      <input type="password" name="password" id="id_password" required autocomplete="current-password" />
    </div>
    <button type="submit" class="br-button primary">Entrar</button>
  </form>
  <p class="mt-3"><a href="{% url 'portal:recuperar_senha' %}">Esqueci minha senha</a> · <a href="{% url 'portal:cadastro' %}">Cadastrar</a></p>
{% endblock %}
