{% extends "portal/base.html" %}
{% load static %}

{% block title %}Editar Serviço — VG 24H{% endblock %}

{% block content %}
<div class="dashboard-content">
  <nav class="br-breadcrumb page-breadcrumb" aria-label="Breadcrumb">
    <div class="crumb-list">
      <span class="crumb"><a href="{% url 'portal:root' %}"><i class="fas fa-home" aria-hidden="true"></i></a></span>
      <span class="crumb"><i class="fas fa-chevron-right" aria-hidden="true"></i></span>
      <span class="crumb"><a href="{% url 'portal:gestao_servicos' %}">Serviços</a></span>
      <span class="crumb"><i class="fas fa-chevron-right" aria-hidden="true"></i></span>
      <span class="crumb">Editar Serviço</span>
    </div>
  </nav>

  <h1 class="h3 mb-4x">Editar Serviço: {{ srv.nome }}</h1>

  <div class="br-card p-4 mx-auto" style="max-width: 700px;">
    <form action="{% url 'portal:gestao_servico_editar' srv.pk %}" method="post">
      {% csrf_token %}
      <div class="br-input mb-3x">
        <label for="id_nome">Nome do Serviço *</label>
        <input id="id_nome" name="nome" type="text" value="{{ srv.nome }}" required />
      </div>
      
      <div class="form-group mb-3x">
        <div class="br-input">
          <label for="id_cat">Categoria *</label>
          <select id="id_cat" name="id_categoria" required>
            {% for cat in categorias %}
              <option value="{{ cat.pk }}" {% if srv.id_categoria_id == cat.pk %}selected{% endif %}>{{ cat.nome }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-row mb-3x">
        <div class="col-6">
          <div class="br-input">
            <label for="id_y">SLA Amarelo (dias) *</label>
            <input id="id_y" name="prazo_amarelo_dias" type="number" value="{{ srv.prazo_amarelo_dias }}" required />
          </div>
        </div>
        <div class="col-6">
          <div class="br-input">
            <label for="id_r">SLA Vermelho (dias) *</label>
            <input id="id_r" name="prazo_vermelho_dias" type="number" value="{{ srv.prazo_vermelho_dias }}" required />
          </div>
        </div>
      </div>

      <div class="br-checkbox mb-4x">
        <input id="id_ativo" name="ativo" type="checkbox" {% if srv.ativo %}checked{% endif %} />
        <label for="id_ativo">Serviço Ativo</label>
      </div>

      <div class="d-flex justify-content-end">
        <a href="{% url 'portal:gestao_servicos' %}" class="br-button secondary mr-2">Cancelar</a>
        <button class="br-button primary" type="submit">Salvar Alterações</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
