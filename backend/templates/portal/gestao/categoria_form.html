{% extends "portal/base.html" %}
{% load static %}

{% block title %}Editar Categoria — VG 24H{% endblock %}

{% block content %}
<div class="dashboard-content">
  <nav class="br-breadcrumb page-breadcrumb" aria-label="Breadcrumb">
    <div class="crumb-list">
      <span class="crumb"><a href="{% url 'portal:root' %}"><i class="fas fa-home" aria-hidden="true"></i></a></span>
      <span class="crumb"><i class="fas fa-chevron-right" aria-hidden="true"></i></span>
      <span class="crumb"><a href="{% url 'portal:gestao_categorias' %}">Categorias</a></span>
      <span class="crumb"><i class="fas fa-chevron-right" aria-hidden="true"></i></span>
      <span class="crumb">Editar Categoria</span>
    </div>
  </nav>

  <h1 class="h3 mb-4x">Editar Categoria: {{ cat.nome }}</h1>

  <div class="br-card p-4 mx-auto" style="max-width: 600px;">
    <form action="{% url 'portal:gestao_categoria_editar' cat.pk %}" method="post">
      {% csrf_token %}
      <div class="br-input mb-3x">
        <label for="id_nome">Nome *</label>
        <input id="id_nome" name="nome" type="text" value="{{ cat.nome }}" required />
      </div>
      <div class="br-checkbox mb-4x">
        <input id="id_ativo" name="ativo" type="checkbox" {% if cat.ativo %}checked{% endif %} />
        <label for="id_ativo">Categoria Ativa</label>
      </div>
      <div class="d-flex justify-content-end">
        <a href="{% url 'portal:gestao_categorias' %}" class="br-button secondary mr-2">Cancelar</a>
        <button class="br-button primary" type="submit">Salvar Alterações</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
