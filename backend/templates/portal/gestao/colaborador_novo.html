{% extends "portal/base.html" %}
{% load static %}

{% block title %}Novo Colaborador — VG 24H{% endblock %}

{% block content %}
<div class="dashboard-content">
  <nav class="br-breadcrumb page-breadcrumb" aria-label="Breadcrumb">
    <div class="crumb-list">
      <span class="crumb"><a href="{% url 'portal:root' %}"><i class="fas fa-home" aria-hidden="true"></i></a></span>
      <span class="crumb"><i class="fas fa-chevron-right" aria-hidden="true"></i></span>
      <span class="crumb"><a href="{% url 'portal:gestao_colaboradores' %}">Colaboradores</a></span>
      <span class="crumb"><i class="fas fa-chevron-right" aria-hidden="true"></i></span>
      <span class="crumb">Novo Colaborador</span>
    </div>
  </nav>

  <h1 class="h3 mb-4x">Novo Colaborador</h1>

  <div class="br-card p-4 mx-auto" style="max-width: 700px;">
    <form action="{% url 'portal:gestao_colaborador_novo' %}" method="post">
      {% csrf_token %}
      <div class="br-input mb-3x">
        <label for="id_nome">Nome Completo *</label>
        <input id="id_nome" name="nome_completo" type="text" required />
      </div>

      <div class="form-row mb-3x">
        <div class="col-6">
          <div class="br-input">
            <label for="id_cpf">CPF *</label>
            <input id="id_cpf" name="cpf" type="text" maxlength="11" placeholder="Somente numeros" required oninput="this.value=this.value.replace(/\D/g,'')" />
          </div>
        </div>
        <div class="col-6">
          <div class="br-input">
            <label for="id_nasc">Dt. Nascimento *</label>
            <input id="id_nasc" name="dt_nascimento" type="date" required style="min-width:170px" />
          </div>
        </div>
      </div>

      <div class="br-input mb-3x">
        <label for="id_email">E-mail *</label>
        <input id="id_email" name="email" type="email" required />
      </div>

      <div class="br-input mb-3x">
        <label for="id_tel">Telefone *</label>
        <input id="id_tel" name="telefone" type="tel" required oninput="this.value=this.value.replace(/\D/g,'')" />
      </div>

      <div class="br-input input-button mb-3x large">
        <label for="id_senha">Senha Provisória *</label>
        <input id="id_senha" name="senha_provisoria" type="password" required />
        <button class="br-button circle small" type="button" aria-label="Mostrar senha">
          <i class="fas fa-eye" aria-hidden="true"></i>
        </button>
      </div>

      <div class="d-flex justify-content-end">
        <a href="{% url 'portal:gestao_colaboradores' %}" class="br-button secondary mr-2">Cancelar</a>
        <button class="br-button primary" type="submit">Criar Conta</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
