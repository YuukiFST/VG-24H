{% extends "portal/base.html" %}
{% block title %}Novo chamado{% endblock %}
{% block content %}
  <h1 class="mb-4">Abrir chamado</h1>
  <form method="post" enctype="multipart/form-data" class="col-lg-8">
    {% csrf_token %}
    {% for field in form %}
    <div class="br-input mb-3">
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field.errors }}
      {{ field }}
    </div>
    {% endfor %}
    <button type="submit" class="br-button primary">Enviar</button>
  </form>
{% endblock %}
