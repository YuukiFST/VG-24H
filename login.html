<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Acesse o portal VG 24H — Prefeitura de Várzea Grande." />
    <title>Entrar — VG 24H</title>
    <link rel="stylesheet" href="https://cdngovbr-ds.estaleiro.serpro.gov.br/design-system/fonts/rawline/css/rawline.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway:300,400,500,600,700,800,900&display=swap" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@govbr-ds/core@3.7.0/dist/core.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.min.css" />
    <link rel="stylesheet" href="css/vg24h.css" />
  </head>
  <body>
    <div class="template-base auth-page">

      <!-- ====== HEADER (compact) ====== -->
      <header class="br-header" id="header">
        <div class="container-lg">
          <div class="header-top">
            <div class="header-logo">
              <a href="index.html">
                <img
                  src="https://cdngovbr-ds.estaleiro.serpro.gov.br/design-system/images/logo-positive.png"
                  alt="logo gov.br"
                />
              </a>
              <span class="br-divider vertical"></span>
              <div class="header-sign">Prefeitura de Várzea Grande — VG 24H</div>
            </div>
          </div>
        </div>
      </header>

      <!-- ====== LOGIN FORM ====== -->
      <main class="auth-main" id="main-content">
        <div class="auth-card">
          <div class="auth-logo">
            <img
              src="https://cdngovbr-ds.estaleiro.serpro.gov.br/design-system/images/logo-positive.png"
              alt="logo gov.br"
            />
            <span>VG 24H</span>
          </div>

          <h1 class="auth-title">Acesse sua conta</h1>
          <p class="auth-subtitle">Informe seus dados para entrar no portal.</p>

          <form id="login-form" action="#" method="post">
            <div class="form-group">
              <div class="br-input">
                <label for="login-email">E-mail</label>
                <input
                  id="login-email"
                  type="email"
                  placeholder="seu.email@exemplo.com"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <div class="br-input has-icon">
                <label for="login-senha">Senha</label>
                <input
                  id="login-senha"
                  type="password"
                  placeholder="Digite sua senha"
                  required
                />
                <button class="br-button circle small" type="button" aria-label="Mostrar senha" onclick="togglePassword(this)">
                  <i class="fas fa-eye" aria-hidden="true"></i>
                </button>
              </div>
            </div>

            <div style="text-align: right; margin-bottom: 8px;">
              <a href="javascript:void(0)" style="font-size: .875rem; color: var(--vg-primary); font-weight: 500;">
                Esqueci minha senha
              </a>
            </div>

            <div class="form-actions">
              <button class="br-button primary large" type="submit" id="btn-login">
                <i class="fas fa-sign-in-alt" aria-hidden="true"></i> Entrar
              </button>
            </div>
          </form>

          <span class="br-divider my-4"></span>

          <div class="form-link">
            Não tem uma conta?
            <a href="cadastro.html">Crie sua conta gratuitamente</a>
          </div>
        </div>
      </main>

      <!-- ====== FOOTER (minimal) ====== -->
      <footer class="br-footer pt-3" id="footer">
        <div class="container-lg">
          <div class="info">
            <div class="text-down-01 text-medium pb-3 text-center">
              VG 24H — Portal de Serviços Públicos de Várzea Grande.
              Conforme o <strong>Design System Gov.br</strong>.
            </div>
          </div>
        </div>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@govbr-ds/core@3.7.0/dist/core-init.min.js"></script>
    <script src="js/vg24h.js"></script>
    <script>
      function togglePassword(btn) {
        const input = btn.parentElement.querySelector('input');
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
          input.type = 'password';
          icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
      }
    </script>
  </body>
</html>
